name: Linux Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk patchelf libfuse2 rpm appstream

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -r requirements-dev.txt
          python -m pip install .[pdf,build]

      - name: Build Rust extension for app pipeline
        working-directory: rust/ledgera_engine
        run: |
          maturin build --out dist/wheels
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/wheels/*.whl'); assert wheels, 'No wheel built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--ignore-installed', '--no-deps', wheels[0]])"

      - name: Install nFPM
        run: npm install -g @goreleaser/nfpm

      - name: Run targeted pytest slice
        run: >
          xvfb-run -a python -m pytest -q --tb=short
          tests/test_app_paths.py
          tests/test_app_update_service.py
          tests/test_hotkeys.py
          tests/test_initial_setup.py
          tests/test_linux_system_packaging.py
          tests/test_main_startup.py
          tests/test_online_mode.py
          tests/test_secret_storage.py
          tests/test_settings_updates.py
          tests/test_bootstrap_migration_verification.py
          tests/test_migrate_json_to_sqlite.py

      - name: Run pyright
        run: npx -y pyright

      - name: Build Linux bundle
        run: pyinstaller --noconfirm Ledgera.linux.spec

      - name: Download appimagetool
        run: |
          mkdir -p tools artifacts
          curl -L -o tools/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x tools/appimagetool.AppImage

      - name: Build Linux AppImage
        run: |
          chmod +x packaging/linux/build_appimage.sh
          bash packaging/linux/build_appimage.sh \
            dist/Ledgera \
            artifacts/Ledgera-linux.AppImage \
            tools/appimagetool.AppImage

      - name: Build Linux system packages
        run: |
          chmod +x packaging/linux/build_system_packages.sh packaging/linux/ledgera
          bash packaging/linux/build_system_packages.sh \
            dist/Ledgera \
            artifacts

      - name: Validate generated AppStream metadata
        run: |
          appstreamcli validate --pedantic build/linux-packages/ledgera.metainfo.xml

      - name: Verify Linux system packages
        run: |
          python packaging/linux/verify_system_packages.py \
            --deb artifacts/Ledgera-$(python -c "import runpy; print(runpy.run_path('version.py')['__version__'])")-x86_64.deb \
            --rpm artifacts/Ledgera-$(python -c "import runpy; print(runpy.run_path('version.py')['__version__'])")-x86_64.rpm

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ledgera-linux
          path: artifacts/Ledgera-linux.AppImage
          if-no-files-found: error

      - name: Upload Linux system packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ledgera-linux-system-packages
          path: |
            artifacts/Ledgera-*-x86_64.deb
            artifacts/Ledgera-*-x86_64.rpm
          if-no-files-found: error

      - name: Attach Linux AppImage to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Ledgera-linux.AppImage
            artifacts/Ledgera-*-x86_64.deb
            artifacts/Ledgera-*-x86_64.rpm
