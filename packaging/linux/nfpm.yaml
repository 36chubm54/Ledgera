# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
name: ledgera
arch: amd64
platform: linux
version: ${PACKAGE_VERSION}
version_schema: semver
release: 1
section: utils
priority: optional
maintainer: 36chubm54 <noreply@github.com>
description: |
  Ledgera personal finance desktop app with multicurrency support,
  import and export flows, budgets, debts, assets, and reports.
vendor: 36chubm54
homepage: https://github.com/36chubm54/Ledgera
license: MIT
scripts:
  postinstall: ${POSTINSTALL_SCRIPT}
  postremove: packaging/linux/postremove.sh
contents:
  - src: ${PACKAGE_ROOTFS}/opt/Ledgera/
    dst: /opt/Ledgera
    type: tree
  - src: ${PACKAGE_ROOTFS}/usr/bin/ledgera
    dst: /usr/bin/ledgera
    file_info:
      mode: 0755
  - src: ${PACKAGE_ROOTFS}/usr/share/applications/ledgera.desktop
    dst: /usr/share/applications/ledgera.desktop
  - src: ${PACKAGE_ROOTFS}/usr/share/metainfo/ledgera.metainfo.xml
    dst: /usr/share/metainfo/ledgera.metainfo.xml
  - src: ${PACKAGE_ROOTFS}/usr/share/icons/hicolor/256x256/apps/ledgera.png
    dst: /usr/share/icons/hicolor/256x256/apps/ledgera.png
overrides:
  deb:
    depends:
      - libfontconfig1
      - libx11-6
      - libxext6
      - libxft2
      - libxrender1
  rpm:
    depends:
      - fontconfig
      - libX11
      - libXext
      - libXft
      - libXrender
